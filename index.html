  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Vitoria Nunes | Links Oficiais",
      "url": "https://vitoriaanunes.com.br/",
      "description": "Acesse os links oficiais, ofertas, perfil e canais principais de Vitoria Nunes."
    }
  </script>
  <style>
    :root {
      --page-bg: #ffffff;
      --gap: 12px;
      --max-width: 1224px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
    }

    .page {
      width: min(calc(100% - 32px), var(--max-width));
      margin: 0 auto;
      padding: 10px 0;
    }

    .seo-content {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 606px));
      gap: var(--gap);
      justify-content: center;
    }

    .card {
      display: block;
      overflow: hidden;
      text-decoration: none;
      background: #f5f5f5;
      transition: opacity 160ms ease;
    }

    .card:hover {
      opacity: 0.96;
    }

    .card__image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width: 920px) {
      .page {
        width: min(calc(100% - 24px), 420px);
        padding: 8px 0;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        aspect-ratio: 328 / 151;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="seo-content">
      <h1>Vitoria Nunes</h1>
      <p>Pagina oficial com links principais, perfil, ofertas e canais de contato.</p>
    </header>
    <section class="grid" aria-label="Links principais">
      <a
        class="card"
        href="https://chat.whatsapp.com/JomlmjXHcC49ldc6Ulwjsm?s=cl&p=i&ilr=0"
        target="_blank"
        rel="nofollow noreferrer"
      >
        <img class="card__image" src="./images/1.png" alt="Oferta principal de Vitoria Nunes" loading="eager">
      </a>

      <a
        class="card"
        href="https://www.ybera.com?parceiro=85766"
        target="_blank"
        rel="nofollow noreferrer"
      >
        <img class="card__image" src="./images/2.png" alt="Perfil e links sociais de Vitoria Nunes" loading="eager">
      </a>

      <a
        class="card"
        href="https://collshp.com/dicasdavitoriaa?view=storefront"
        target="_blank"
        rel="nofollow noreferrer"
      >
        <img class="card__image" src="./images/3.png" alt="Grupo exclusivo de Vitoria Nunes" loading="lazy">
      </a>

      <a
        class="card"
        href="https://kiwify.app/zH1hsdp?afid=CeePJOsS"
        target="_blank"
        rel="nofollow noreferrer"
      >
        <img class="card__image" src="./images/4.png" alt="Produto em destaque de Vitoria Nunes" loading="lazy">
      </a>
    </section>
  </main>
</body>
</html>
